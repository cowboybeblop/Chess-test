<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Analyse Lidraughts — Scan</title>
<style>
  :root{
    --bg:#10141a; --panel:#1a212a; --panel-2:#212a35; --line:#2b3542;
    --gold:#d2a44c; --gold-dim:#8f7638; --text:#e9e6dd; --text-dim:#8d95a0;
    --teal:#2fb3ab; --win:#63b56b; --loss:#d97b52;
    --light-sq:#e9e2cd; --dark-sq:#7d6b52;
    --mono:'Courier New', ui-monospace, Consolas, monospace;
    --serif: Georgia, 'Times New Roman', serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--mono); }
  .app{ max-width:560px; margin:0 auto; padding:16px 14px 60px; }
  header{ display:flex; align-items:baseline; justify-content:space-between; margin:4px 2px 14px; }
  header h1{ font-family:var(--serif); font-weight:400; font-size:21px; margin:0; }
  header h1 span{ color:var(--gold); font-style:italic; }
  header .depth-mini{ display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-dim); }
  .tabs{ display:flex; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:4px; gap:4px; margin-bottom:14px; }
  .tabs button{ flex:1; background:none; border:none; border-radius:6px; padding:10px 0; color:var(--text-dim); font-family:var(--mono); font-size:13.5px; cursor:pointer; }
  .tabs button.active{ background:var(--panel-2); color:var(--gold); box-shadow:inset 0 0 0 1px var(--line); }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; margin-bottom:12px; }
  .card h2{ margin:0 0 10px; font-size:10.5px; letter-spacing:.15em; text-transform:uppercase; color:var(--gold-dim); }
  .row{ display:flex; gap:8px; flex-wrap:wrap; }
  input[type="text"]{ flex:1; min-width:140px; background:var(--panel-2); border:1px solid var(--line); color:var(--text); padding:12px; border-radius:6px; font-family:var(--mono); font-size:15px; }
  input[type="text"]:focus{ outline:none; border-color:var(--gold); }
  select{ background:var(--panel-2); border:1px solid var(--line); color:var(--text); padding:6px 8px; border-radius:6px; font-family:var(--mono); font-size:12px; }
  button{ background:var(--panel-2); color:var(--text); border:1px solid var(--line); border-radius:6px; padding:12px 16px; cursor:pointer; font-family:var(--mono); font-size:14px; white-space:nowrap; -webkit-appearance:none; }
  button:active{ border-color:var(--gold); color:var(--gold); }
  button.primary{ background:#2a2416; border-color:var(--gold-dim); color:var(--gold); flex:1; }
  button:disabled{ opacity:.55; cursor:not-allowed; }
  textarea{ width:100%; height:72px; background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:6px; padding:10px; font-family:var(--mono); font-size:13px; resize:vertical; }
  .status{ font-size:12.5px; color:var(--text-dim); margin-top:10px; line-height:1.5; min-height:16px; display:flex; gap:6px; }
  .status.loading{ color:var(--gold); } .status.success{ color:var(--win); } .status.error{ color:var(--loss); }
  .status-icon.spin{ display:inline-block; animation:spin 1.1s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .hidden{ display:none !important; }

  .games-list{ max-height:340px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
  .game-item{ background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:10px 12px; cursor:pointer; }
  .game-item:active{ border-color:var(--gold); }
  .game-item-main{ display:flex; align-items:center; gap:8px; font-size:13.5px; }
  .game-color-dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .game-color-dot.w{ background:#f7f4ea; border:1px solid #555; }
  .game-color-dot.b{ background:#1c1c1c; border:1px solid #666; }
  .game-opponent{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .outcome-badge{ font-size:10.5px; padding:2px 8px; border-radius:10px; flex-shrink:0; }
  .outcome-badge.win{ background:#1e3a24; color:var(--win); }
  .outcome-badge.loss{ background:#3a231a; color:var(--loss); }
  .outcome-badge.draw{ background:#2a2932; color:var(--text-dim); }
  .game-item-sub{ font-size:10.5px; color:var(--text-dim); margin-top:4px; display:flex; align-items:center; gap:6px; }
  .variant-chip{ font-size:9.5px; border:1px solid var(--line); border-radius:8px; padding:1px 7px; color:var(--teal); }
  .mini-del{ margin-left:auto; padding:2px 8px; font-size:11px; border-radius:4px; color:var(--text-dim); }
  .history-empty{ font-size:12.5px; color:var(--text-dim); text-align:center; padding:26px 0; line-height:1.7; }

  .results-title{ font-family:var(--serif); font-style:italic; font-size:15px; text-align:center; margin-bottom:12px; }
  .board-area{ display:flex; gap:8px; align-items:stretch; justify-content:center; }
  .eval-bar{ width:14px; border-radius:3px; overflow:hidden; background:#181818; border:1px solid #3a2c18; display:flex; flex-direction:column; justify-content:flex-end; position:relative; flex-shrink:0; }
  .eval-bar .eval-fill{ background:#efece1; width:100%; height:50%; transition:height .45s ease; }
  .eval-bar .eval-label{ position:absolute; bottom:4px; left:0; right:0; text-align:center; font-size:8px; font-weight:bold; color:#1c1c1c; writing-mode:vertical-lr; pointer-events:none; }
  .eval-bar .eval-label.on-dark{ color:#f0ede3; bottom:auto; top:4px; }
  .board-wrap{ position:relative; width:min(88vw, 460px); }
  .board-grid{
    position:relative; display:grid;
    grid-template-columns:repeat(10, minmax(0,1fr)); grid-template-rows:repeat(10, minmax(0,1fr));
    width:100%; aspect-ratio:1/1; box-shadow:0 0 0 2px #0c0a06, 0 4px 18px rgba(0,0,0,.35);
    border-radius:4px; overflow:hidden; user-select:none; --cell:38px;
  }
  .sq{ background:var(--light-sq); position:relative; }
  .sq.dark{ background:var(--dark-sq); }
  .coord{ position:absolute; top:1px; left:2px; font-size:8px; font-weight:bold; opacity:.4; color:var(--light-sq); pointer-events:none; }
  .piece-layer{ position:absolute; inset:0; pointer-events:none; z-index:4; }
  .disc{
    position:absolute; top:0; left:0; width:10%; height:10%;
    display:flex; align-items:center; justify-content:center;
    transition:transform .18s ease;
  }
  @media (prefers-reduced-motion: reduce){ .disc{ transition:none; } .eval-fill{ transition:none; } }
  .disc::before{
    content:''; width:78%; height:78%; border-radius:50%;
    box-shadow:inset 0 -3px 5px rgba(0,0,0,.35), 0 2px 3px rgba(0,0,0,.45);
  }
  .disc.w::before{ background:radial-gradient(circle at 35% 30%, #fdfaf0, #d8d2bd 65%, #b8b09a); border:1px solid #8f8a78; }
  .disc.b::before{ background:radial-gradient(circle at 35% 30%, #4a4a4a, #1e1e1e 65%, #0c0c0c); border:1px solid #000; }
  .disc.king::after{
    content:'★'; position:absolute; font-size:calc(var(--cell) * 0.4); line-height:1;
  }
  .disc.w.king::after{ color:#a5852f; } .disc.b.king::after{ color:#d2a44c; }
  svg.arrows{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:6; }

  .move-info{ display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; margin-top:12px; min-height:30px; font-size:13.5px; }
  .mi-move{ font-weight:bold; }
  .mi-chip{ border:1px solid; border-radius:12px; padding:2px 10px; font-size:12px; }
  .mi-eval{ color:var(--text-dim); font-size:12px; }
  .mi-start{ color:var(--text-dim); }
  .mi-note{ flex-basis:100%; margin-top:2px; padding:6px 10px; text-align:left; font-size:11.5px; line-height:1.55; color:var(--text-dim); background:var(--panel-2); border-left:3px solid var(--gold); border-radius:0 6px 6px 0; }
  .playback-controls{ display:flex; gap:6px; margin-top:12px; }
  .playback-controls button{ flex:1; padding:10px 6px; font-size:16px; }
  .summary{ display:flex; gap:10px; margin-top:14px; }
  .side-summary{ flex:1; background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:10px 12px; }
  .side-name{ font-size:11.5px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .side-name .you{ color:var(--gold); font-size:10px; border:1px solid var(--gold-dim); border-radius:8px; padding:0 6px; margin-left:4px; }
  .side-acc{ font-family:var(--serif); font-size:30px; margin:4px 0 2px; }
  .side-acc .pct{ font-size:15px; color:var(--text-dim); }
  .side-sub{ font-size:10.5px; color:var(--text-dim); }
  .class-table{ margin-top:10px; background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:6px 12px; }
  .ct-row{ display:grid; grid-template-columns:1fr 44px 28px 44px; align-items:center; gap:6px; padding:5px 0; border-bottom:1px solid #232a31; }
  .ct-row:last-child{ border-bottom:none; }
  .ct-row.zero{ opacity:.38; }
  .ct-label{ font-size:12.5px; }
  .ct-count{ font-size:15px; font-weight:bold; text-align:center; }
  .dico-pin{ width:20px; height:20px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; color:#14181c; border:1px solid rgba(12,12,12,.55); margin:0 auto; }
  .move-list{ max-height:220px; overflow-y:auto; font-size:13.5px; margin-top:14px; }
  .move-row{ display:flex; gap:6px; padding:4px 0; border-bottom:1px solid #232a31; }
  .move-num{ color:var(--text-dim); width:32px; flex-shrink:0; }
  .move-cell{ flex:1; display:flex; align-items:center; gap:5px; cursor:pointer; padding:2px 4px; border-radius:4px; }
  .move-cell.active{ background:#2a2416; color:var(--gold); }
  .badge{ font-size:11px; font-weight:bold; }
  details summary{ cursor:pointer; color:var(--gold-dim); font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; }
</style>
</head>
<body>
<div id="debugBanner" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#3a1616; color:#ffd7b8; padding:10px 12px; font-family:'Courier New',monospace; font-size:11.5px; line-height:1.6; z-index:9999; max-height:45vh; overflow-y:auto; white-space:pre-wrap; border-top:2px solid #d97b52;"></div>
<script>
  function showDebug(msg) {
    var el = document.getElementById('debugBanner');
    el.style.display = 'block';
    el.textContent += (el.textContent ? '\n———\n' : '⚠ Erreur détectée :\n') + msg;
  }
  window.addEventListener('error', function (e) { showDebug((e.message || 'Erreur inconnue') + (e.filename ? '\n  ' + e.filename.split('/').pop() + ':' + e.lineno : '')); });
  window.addEventListener('unhandledrejection', function (e) { showDebug('Erreur async: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason))); });
</script>

<div class="app">
  <header>
    <h1>Analyse <span>Lidraughts</span></h1>
    <div class="depth-mini">
      <label for="depthSelect">prof.</label>
      <select id="depthSelect">
        <option value="9">9</option>
        <option value="11" selected>11</option>
        <option value="13">13</option>
        <option value="15">15</option>
        <option value="17">17</option>
      </select>
    </div>
  </header>

  <div class="tabs">
    <button id="tabAnalyze" class="active">Analyser</button>
    <button id="tabHistory">Historique</button>
  </div>

  <div id="viewAnalyze">
    <div class="card">
      <div class="row">
        <input type="text" id="usernameInput" placeholder="pseudo lidraughts" autocapitalize="off" autocorrect="off">
        <button id="btnSearch">Chercher</button>
      </div>
      <div class="status" id="status"></div>
      <div class="status" id="engineStatus" style="margin-top:4px;"></div>
    </div>

    <div class="card hidden" id="gamesListCard">
      <h2>Parties récentes (10×10 uniquement)</h2>
      <div class="games-list" id="gamesList"></div>
    </div>

    <div class="card hidden" id="pdnCard">
      <h2>PDN de la partie <span id="pdnState" style="text-transform:none;letter-spacing:0;"></span></h2>
      <textarea id="pdnOut" readonly style="height:96px;"></textarea>
      <div class="row" style="margin-top:8px;">
        <button class="primary" id="btnCopyPdn">📋 Copier le PDN</button>
      </div>
    </div>

    <div class="card">
      <details>
        <summary>Coller un PDN à la place</summary>
        <textarea id="pdnTextarea" placeholder="[White ...] 1. 32-28 18-23 …" style="margin-top:10px;"></textarea>
        <div class="row" style="margin-top:8px;">
          <button class="primary" id="btnAnalyzePdn">Analyser ce PDN</button>
        </div>
      </details>
    </div>

    <div class="card hidden" id="results">
      <div class="results-title" id="resultsTitle"></div>
      <div class="board-area">
        <div class="eval-bar">
          <div class="eval-fill" id="evalFill"></div>
          <div class="eval-label" id="evalLabel">0.0</div>
        </div>
        <div class="board-wrap">
          <div class="board-grid" id="boardGrid">
            <div class="piece-layer" id="pieceLayer"></div>
            <svg class="arrows" id="arrowSvg" preserveAspectRatio="none"></svg>
          </div>
        </div>
      </div>
      <div class="move-info" id="moveInfo"></div>
      <div class="playback-controls">
        <button id="btnStart">⏮</button>
        <button id="btnPrev">◀</button>
        <button id="btnNext">▶</button>
        <button id="btnEnd">⏭</button>
      </div>
      <div class="summary" id="summary"></div>
      <div class="class-table" id="classTable"></div>
      <div class="move-list" id="moveList"></div>
      <div class="row" style="margin-top:12px;">
        <button class="primary" id="btnExportCSV">⬇ Exporter en CSV</button>
      </div>
    </div>
  </div>

  <div id="viewHistory" class="hidden">
    <div class="card">
      <h2>Analyses enregistrées</h2>
      <div class="history-empty hidden" id="historyEmpty">Aucune analyse pour l'instant.<br>Elles s'enregistrent ici automatiquement.</div>
      <div class="games-list" id="historyList"></div>
      <div class="row" style="margin-top:10px;">
        <button id="btnClearHistory" class="hidden">Tout effacer</button>
      </div>
    </div>
  </div>
</div>

<script src="dames-logic.js" onerror="showDebug('dames-logic.js introuvable')"></script>
<script src="scan-engine.js" onerror="showDebug('scan-engine.js introuvable')"></script>
<script src="dames-app.js" onerror="showDebug('dames-app.js introuvable')"></script>
<script src="dames-ui.js" onerror="showDebug('dames-ui.js introuvable')"></script>
</body>
</html>
