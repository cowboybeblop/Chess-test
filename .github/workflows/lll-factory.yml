name: LLL — Usine à données
# Déclenchable depuis l'app GitHub mobile : onglet Actions -> Run workflow.
# Télécharge une tranche de la base ouverte Lichess, l'analyse avec le
# pipeline de l'outil (Stockfish natif) et committe le JSONL dans dataset/.

on:
  workflow_dispatch:
    inputs:
      games:
        description: "Nombre de parties à analyser"
        default: "200"
      depth:
        description: "Profondeur Stockfish"
        default: "14"
      month:
        description: "Mois de la base Lichess (AAAA-MM)"
        default: "2026-05"
      elo_min:
        description: "Elo minimum des deux joueurs (0 = pas de filtre)"
        default: "0"
      elo_max:
        description: "Elo maximum des deux joueurs (0 = pas de filtre)"
        default: "0"

permissions:
  contents: write

jobs:
  factory:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # marge sous la limite de 6 h
    steps:
      - uses: actions/checkout@v4

      - name: Installer Stockfish + zstd
        run: sudo apt-get update -q && sudo apt-get install -y -q stockfish zstd

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extraire une tranche de la base Lichess (en flux, sans tout télécharger)
        run: |
          N=${{ github.event.inputs.games }}
          # décalage aléatoire pour varier les parties d'un run à l'autre
          SKIP=$(( RANDOM % 5000 ))
          echo "Tranche : $N parties après en avoir sauté $SKIP"
          # filtre Elo : une partie n'est gardée que si les DEUX joueurs
          # sont dans [elo_min, elo_max] (0 = pas de borne)
          curl -s "https://database.lichess.org/standard/lichess_db_standard_rated_${{ github.event.inputs.month }}.pgn.zst" \
            | zstdcat 2>/dev/null \
            | awk -v n="$N" -v skip="$SKIP" \
                  -v lo="${{ github.event.inputs.elo_min }}" -v hi="${{ github.event.inputs.elo_max }}" '
                /^\[Event / {
                  if (buf != "" && ok(w, b)) { kept++; if (kept > skip && kept <= skip + n) printf "%s", buf }
                  if (kept > skip + n) exit
                  buf = ""; w = 0; b = 0
                }
                /^\[WhiteElo "/ { gsub(/[^0-9]/, "", $2); w = $2 + 0 }
                /^\[BlackElo "/ { gsub(/[^0-9]/, "", $2); b = $2 + 0 }
                { buf = buf $0 "\n" }
                function ok(w, b) {
                  if (lo + 0 > 0 && (w < lo || b < lo)) return 0
                  if (hi + 0 > 0 && (w > hi || b > hi)) return 0
                  return 1
                }
                END { if (buf != "" && ok(w, b)) { kept++; if (kept > skip && kept <= skip + n) printf "%s", buf } }
              ' > slice.pgn || true
          echo "Tranche extraite : $(grep -c "^\[Event " slice.pgn) parties, $(du -h slice.pgn | cut -f1)"

      - name: Analyser (par tranches, commit après chaque tranche)
        timeout-minutes: 330   # coupe AVANT le timeout du job -> l'étape suivante s'exécute
        env:
          STOCKFISH_PATH: /usr/games/stockfish
        run: |
          mkdir -p dataset chunks
          git config user.name "lll-factory"
          git config user.email "actions@github.com"
          # découper slice.pgn en tranches de 150 parties
          awk '/^\[Event / { g++ } { print > sprintf("chunks/c%04d.pgn", int((g-1)/150)) }' slice.pgn
          i=0
          for chunk in chunks/c*.pgn; do
            i=$((i+1))
            echo "=== Tranche $i : $chunk ==="
            node factory/factory.mjs "$chunk" "dataset/part-${{ github.run_id }}-$i.jsonl" \
              ${{ github.event.inputs.depth }} 99999
            # commit immédiat : la tranche est EN SÉCURITÉ dans le repo
            git add dataset/
            git commit -m "dataset: tranche $i du run ${{ github.run_id }} (+$(wc -l < dataset/part-${{ github.run_id }}-$i.jsonl) ex.)" || true
            git pull --rebase && git push || (sleep 5 && git pull --rebase && git push)
          done

      - name: Filet de sécurité — committer ce qui reste
        if: always()   # s'exécute même après timeout/annulation de l'analyse
        run: |
          git config user.name "lll-factory"
          git config user.email "actions@github.com"
          git add dataset/ || true
          git commit -m "dataset: sauvetage fin de run ${{ github.run_id }}" || echo "rien à sauver"
          git pull --rebase && git push || true
